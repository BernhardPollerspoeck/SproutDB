name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore SproutDB.slnx

      - name: Build
        run: dotnet build SproutDB.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test SproutDB.slnx --configuration Release --no-restore --verbosity normal

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Pack
        run: dotnet pack src/SproutDB.Core/SproutDB.Core.csproj --configuration Release -p:VersionSuffix= -p:Version=$(grep -oP '(?<=<VersionPrefix>)[^<]+' src/SproutDB.Core/SproutDB.Core.csproj).${{ github.run_number }} --output ./nupkg

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
